<!DOCTYPE html>https://twqxxqsjcakcrtsupwfe.supabase.co
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>MitchPath Logistic LLC — Hiring Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav class="topnav">
    <div class="topnav-left">
      <span class="brand-dot"></span>
      <span class="appname">MitchPath Careers</span>
    </div>
    <div class="topnav-right">
      <a class="navbtn" href="index.html">Back to Apply</a>
    </div>
  </nav>

  <div class="page">
    <header class="header">
      <div class="brand">
        <img src="logo.png" alt="MitchPath Logistic LLC Logo" class="logo" />
        <div class="brand-text">
          <div class="company">MITCHPATH LOGISTIC LLC</div>
          <div class="doc-title">HIRING DASHBOARD — CDL APPLICATIONS</div>
          <div class="sub-title">Live inbox (Supabase database)</div>
        </div>
      </div>
    </header>

    <section class="card">
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;">
        <div>
          <h2 style="margin:0;">Applications</h2>
          <p class="muted" style="margin-top:6px;">Search, view, approve or deny.</p>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <input id="search" type="text" placeholder="Search name, phone, CDL..." style="min-width:260px;">
          <button class="btn secondary" id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>

      <div id="tableWrap" style="margin-top:12px;"></div>
    </section>

    <section class="card" id="detailCard" style="display:none;">
      <h2 style="margin-top:0;">Application Details</h2>
      <div id="details"></div>

      <div class="actions" style="margin-top:14px;">
        <button class="btn secondary" id="closeDetails" type="button">Close</button>
      </div>
    </section>
  </div>

  <script>
    // ====== SUPABASE SETTINGS (PASTE YOUR VALUES) ======
    const SUPABASE_URL = "PASTE_SUPABASE_PROJECT_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_SUPABASE_ANON_PUBLIC_KEY_HERE";

    async function supabaseSelectApps() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/applications?select=*&order=submitted_at.desc`, {
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }

    async function supabaseUpdateStatus(app_id, status) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/applications?app_id=eq.${encodeURIComponent(app_id)}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error(await res.text());
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    let ALL_APPS = [];

    function renderTable(filter="") {
      const q = filter.trim().toLowerCase();
      const filtered = q
        ? ALL_APPS.filter(a =>
            (a.full_name||"").toLowerCase().includes(q) ||
            (a.phone||"").toLowerCase().includes(q) ||
            (a.cdl_number||"").toLowerCase().includes(q) ||
            (a.status||"").toLowerCase().includes(q)
          )
        : ALL_APPS;

      const wrap = document.getElementById("tableWrap");

      if (!filtered.length) {
        wrap.innerHTML = "<p class='muted'>No applications found.</p>";
        return;
      }

      const rows = filtered.map(a => `
        <tr>
          <td>${escapeHtml(a.status)}</td>
          <td>${escapeHtml(a.full_name || "")}</td>
          <td>${escapeHtml(a.phone || "")}</td>
          <td>${escapeHtml(a.cdl_number || "")}</td>
          <td>${escapeHtml(a.cdl_state || "")}</td>
          <td>${escapeHtml(a.cdl_exp || "")}</td>
          <td class="muted">${escapeHtml(fmtDate(a.submitted_at))}</td>
          <td style="white-space:nowrap;">
            <button class="btn secondary" type="button" onclick="viewApp('${escapeHtml(a.app_id)}')">View</button>
            <button class="btn" type="button" onclick="setStatus('${escapeHtml(a.app_id)}','Approved')">Approve</button>
            <button class="btn" type="button" onclick="setStatus('${escapeHtml(a.app_id)}','Denied')">Deny</button>
          </td>
        </tr>
      `).join("");

      wrap.innerHTML = `
        <div style="overflow:auto;">
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr style="text-align:left;">
                <th style="padding:10px; border-bottom:1px solid #ddd;">Status</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">Name</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">Phone</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">CDL #</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">State</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">CDL Exp</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">Submitted</th>
                <th style="padding:10px; border-bottom:1px solid #ddd;">Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    window.setStatus = async function(app_id, status){
      try {
        await supabaseUpdateStatus(app_id, status);
        await loadApps();
        renderTable(document.getElementById("search").value);
      } catch (e) {
        alert("Status update failed: " + e.message);
      }
    }

    window.viewApp = function(app_id){
      const a = ALL_APPS.find(x => x.app_id === app_id);
      if (!a) return;

      const uploads = a.uploads || {};
      const cdlFiles = (uploads.cdl || []).join(", ") || "None";
      const medFiles = (uploads.med || []).join(", ") || "None";

      document.getElementById("details").innerHTML = `
        <div class="box">
          <div><strong>Status:</strong> ${escapeHtml(a.status)}</div>
          <div><strong>Application ID:</strong> ${escapeHtml(a.app_id)}</div>
          <div><strong>Submitted:</strong> ${escapeHtml(fmtDate(a.submitted_at))}</div>
        </div>

        <div class="box" style="margin-top:12px;">
          <h3 style="margin-top:0;">Applicant</h3>
          <div><strong>Name:</strong> ${escapeHtml(a.full_name)}</div>
          <div><strong>Phone:</strong> ${escapeHtml(a.phone)}</div>
          <div><strong>Email:</strong> ${escapeHtml(a.email)}</div>
          <div><strong>Address:</strong> ${escapeHtml(a.address)}</div>
        </div>

        <div class="box" style="margin-top:12px;">
          <h3 style="margin-top:0;">CDL</h3>
          <div><strong>CDL #:</strong> ${escapeHtml(a.cdl_number)}</div>
          <div><strong>State:</strong> ${escapeHtml(a.cdl_state)}</div>
          <div><strong>Expiration:</strong> ${escapeHtml(a.cdl_exp)}</div>
        </div>

        <div class="box" style="margin-top:12px;">
          <h3 style="margin-top:0;">Medical</h3>
          <div><strong>Med Card Exp:</strong> ${escapeHtml(a.med_card_exp)}</div>
        </div>

        <div class="box" style="margin-top:12px;">
          <h3 style="margin-top:0;">Uploads (file names)</h3>
          <div><strong>CDL Upload:</strong> ${escapeHtml(cdlFiles)}</div>
          <div><strong>Medical Upload:</strong> ${escapeHtml(medFiles)}</div>
          <p class="muted" style="margin-top:8px;">
            Next step: store actual files using Supabase Storage.
          </p>
        </div>
      `;

      document.getElementById("detailCard").style.display = "block";
      window.scrollTo({ top: document.getElementById("detailCard").offsetTop - 10, behavior: "smooth" });
    }

    async function loadApps(){
      ALL_APPS = await supabaseSelectApps();
    }

    document.getElementById("search").addEventListener("input", (e) => renderTable(e.target.value));
    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try {
        await loadApps();
        renderTable(document.getElementById("search").value);
      } catch (e) {
        alert("Refresh failed: " + e.message);
      }
    });

    document.getElementById("closeDetails").addEventListener("click", () => {
      document.getElementById("detailCard").style.display = "none";
    });

    (async function init(){
      try {
        await loadApps();
        renderTable();
      } catch (e) {
        document.getElementById("tableWrap").innerHTML =
          "<p class='muted'>Dashboard could not load applications. Check your Supabase URL/Key and RLS policies.</p>";
        alert("Dashboard load failed: " + e.message);
      }
    })();
  </script>
</body>
</html>
